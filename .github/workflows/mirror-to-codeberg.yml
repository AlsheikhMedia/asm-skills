name: Mirror to Codeberg

on:
  push:
  delete:
  workflow_dispatch:

concurrency:
  group: mirror-to-codeberg
  cancel-in-progress: false

permissions:
  contents: read

jobs:
  mirror:
    runs-on: ubuntu-latest
    steps:
      - name: Mirror GitHub -> Codeberg
        env:
          CODEBERG_USER: ${{ secrets.CODEBERG_USER }}
          CODEBERG_TOKEN: ${{ secrets.CODEBERG_TOKEN }}
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          set -euo pipefail
          # Embed GITHUB_TOKEN so private repos can be cloned. The token is
          # auto-issued by Actions and scoped to read this repo only.
          git clone --mirror "https://x-access-token:${GH_TOKEN}@github.com/${GITHUB_REPOSITORY}.git" repo.git
          cd repo.git
          # Feed Codeberg credentials via a credential helper so special chars
          # in the token (e.g. '/', ':', '@') don't break URL parsing.
          git -c "credential.helper=" \
              -c "credential.helper=!f() { echo username=\"$CODEBERG_USER\"; echo password=\"$CODEBERG_TOKEN\"; }; f" \
              push --mirror https://codeberg.org/AlsheikhMedia/asm-skills.git
