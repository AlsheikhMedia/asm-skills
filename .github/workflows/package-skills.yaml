name: Package Skills

on:
  release:
    types: [created]
  workflow_dispatch:

jobs:
  package:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4

      - name: Package all skills
        run: |
          mkdir -p dist
          find skills -name "SKILL.md" -print0 | while IFS= read -r -d '' skillfile; do
            skill_dir=$(dirname "$skillfile")
            skill_name=$(basename "$skill_dir")
            echo "Packaging $skill_name from $skill_dir..."
            (cd "$skill_dir" && zip -r "$GITHUB_WORKSPACE/dist/${skill_name}.skill" . -x "*.DS_Store" "__pycache__/*" "node_modules/*" "evals/*")
            echo "  Created dist/${skill_name}.skill"
          done

      - name: Upload to release
        if: github.event_name == 'release'
        uses: softprops/action-gh-release@v2
        with:
          files: dist/*.skill

      - name: Upload artifacts
        if: github.event_name == 'workflow_dispatch'
        uses: actions/upload-artifact@v4
        with:
          name: skill-packages
          path: dist/*.skill
